<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Умный Агрегатор Цитат</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #007BFF; text-align: center; margin-bottom: 30px; }
        .stats-box { display: flex; justify-content: space-around; background: #e7f1ff; padding: 15px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #bde0ff; }
        .stat-card { text-align: center; font-size: 18px; }
        .stat-card span { font-weight: bold; color: #0056b3; font-size: 22px; }
        .btn { background-color: #007BFF; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #0056b3; }
        .btn-parse { background-color: #28a745; margin-bottom: 20px; }
        .btn-parse .btn:hover { background-color: #218838; }
        .quote-card { background: #fff; padding: 15px; margin-bottom: 15px; border-left: 5px solid #007BFF; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); position: relative; }
        .quote-text { font-size: 16px; font-style: italic; margin-bottom: 8px; }
        .quote-author { color: #666; font-size: 14px; }
        .btn-delete { color: #dc3545; text-decoration: none; font-weight: bold; font-size: 13px; display: inline-block; margin-top: 10px; }
        .btn-delete:hover { text-decoration: underline; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Умный Агрегатор Цитат</h1>

    <div class="stats-box">
        <div class="stat-card">Всего цитат: <br><span>{{ stats.total }}</span></div>
        <div class="stat-card">Уникальных авторов: <br><span>{{ stats.authors }}</span></div>
    </div>

    <form action="/run_parser" method="POST" style="margin-bottom: 30px;">
        <button type="submit" class="btn" style="background-color: #28a745;">🔄 Спарсить новые цитаты из интернета</button>
    </form>

    <h3>✍️ Добавить цитату вручную:</h3>
    <form action="/add_quote" method="POST">
        <input type="text" name="author_name" placeholder="Имя автора" required>
        <textarea name="quote_text" placeholder="Текст цитаты..." rows="3" required></textarea>
        <button type="submit" class="btn">Сохранить в базу</button>
    </form>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <h3>📚 Коллекция цитат:</h3>
    {% for q in quotes %}
    <div class="quote-card">
        <div class="quote-text">"{{ q.text }}"</div>
        <div class="quote-author">— {{ q.author }} <span style="color: #ccc;">(ID: {{ q.id }})</span></div>
        <a href="/delete_quote/{{ q.id }}" class="btn-delete">❌ Удалить из базы</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
